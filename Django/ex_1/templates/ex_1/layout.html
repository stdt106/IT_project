{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>
        {% block title %}

        {% endblock %}
    </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'ex_1/css/ex_1.css' %}">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.6.0/css/all.css">
</head>
<body>
    <aside>
        <div class="buttons">
            <button class="btn btn-warning">Спорт</button>
            <button class="btn btn-warning">Наука</button>
            <button class="btn btn-warning">Искусство</button>
            <button class="btn btn-warning">Экономика</button>
            <button class="btn btn-warning">Криптомир</button>
            <button class="btn btn-warning">Образование</button>
        </div>
        <h2><i class="fa-brands fa-neos"></i></h2>
        <h3><span class="logo">Fast\News</span></h3>
        <h4> Навигация</h4>
        <ul>
            <a href="{% url 'news_home' %}"><li><i class="fa-regular fa-newspaper"></i> Новости</li></a>
            <a href="{% url 'home' %}"><li><i class="fa-solid fa-globe"></i> Сегодня</li></a>
            <a href="{% url 'about' %}"><li><i class="fa-solid fa-earth-americas"></i> За неделю</li></a>
            <a href="{% url 'create' %}"><li><button class="btn btn-info"><i class="fa-solid fa-circle-plus"></i> Добавить запись</button></li></a>
        </ul>
    </aside>
    <main>
        {% block content %}

        {% endblock %}
    </main>
</body>
</html>
