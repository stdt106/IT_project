{% extends 'ex_1/layout.html' %}

{% block title %}
    Новости на сайте
{% endblock %}

{% block content %}
    <div class="features">
        <h1>Новости на сайте</h1>

        {% if news %}
            {% for el in news %}
                <div class="alert alert-warning">
                    <h3>{{ el.title }}</h3>
                    <p>{{ el.anons }}</p>
                    <a href="{% url 'article_detail' el.id %}">Читать далее</a>
                </div>
            {% endfor %}
        {% else %}
            <p>Нет новостей :(</p>
        {% endif %}

        {# Комментарий #}
    </div>
{% endblock %}
